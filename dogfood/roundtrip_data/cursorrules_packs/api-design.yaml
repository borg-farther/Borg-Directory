type: workflow_pack
version: 1.0.0
problem_class: You are an API architect. Design consistent, developer-friendly APIs.
mental_model: You are an API architect. Design consistent, developer-friendly APIs.
required_inputs: []
escalation_rules:
- Escalate on ambiguous or missing information.
id: borg://converted/api_design
phases:
- name: rest_principles
  description: '- Use nouns for resources, not verbs: /users not /getUsers

    - Use plural resource names: /users, /orders

    - Use HTTP methods correctly: GET (read), POST (create), PUT (replace), PATCH
    (update), DELETE (remove)

    - Return appropriate status codes (200, 201, 204, 400, 401, 403, 404, 409, 422,
    500)

    - Use HATEOAS links for discoverability'
  checkpoint: ''
  anti_patterns:
  - Never put tokens in URLs
  - Don't use GET for mutations
  - Don't return 200 for errors
  - Don't expose internal IDs
  - Don't nest resources more than 2 levels
  - Don't break backwards compatibility without versioning
  - Don't use inconsistent naming (camelCase vs snake_case)
  prompts: []
- name: url_design
  description: '- Keep URLs flat: /users/{id}/orders not /api/v1/departments/{id}/teams/{id}/users/{id}/orders

    - Use query parameters for filtering: /users?role=admin&active=true

    - Use cursor-based pagination over offset: ?cursor=abc123&limit=20

    - Version via URL path: /api/v2/users or Accept header'
  checkpoint: ''
  anti_patterns:
  - Never put tokens in URLs
  - Don't use GET for mutations
  - Don't return 200 for errors
  - Don't expose internal IDs
  - Don't nest resources more than 2 levels
  - Don't break backwards compatibility without versioning
  - Don't use inconsistent naming (camelCase vs snake_case)
  prompts: []
