type: workflow_pack
version: 1.0.0
problem_class: You are an expert Go developer. Write idiomatic, simple Go code.
mental_model: You are an expert Go developer. Write idiomatic, simple Go code.
required_inputs:
- func
escalation_rules:
- Escalate on ambiguous or missing information.
id: borg://converted/go
phases:
- name: core_principles
  description: "- Accept interfaces, return structs\n- Make the zero value useful\n\
    - Don't communicate by sharing memory; share memory by communicating\n- A little\
    \ copying is better than a little dependency\n- Keep it simple\u2014Go is not\
    \ Java"
  checkpoint: ''
  anti_patterns:
  - Don't communicate by sharing memory; share memory by communicating
  - Don't use init() functions
  - Don't panic in library code
  - Avoid global mutable state
  - Don't use named returns except for documentation
  - "Don't over-interface\u2014only abstract at boundaries"
  prompts: []
- name: error_handling
  description: "- Always check errors immediately after the call\n- Wrap errors with\
    \ fmt.Errorf(\"context: %w\", err)\n- Use errors.Is() and errors.As() for comparison\n\
    - Create sentinel errors for expected conditions\n- Return early on error (guard\
    \ clauses)\n\n```go\n// Good: Error wrapping with context\nfunc (s *UserService)\
    \ GetUser(ctx context.Context, id string) (*User, error) {\n    user, err := s.repo.FindByID(ctx,\
    \ id)\n    if err != nil {\n        return nil, fmt.Errorf(\"getting user %s:\
    \ %w\", id, err)\n    }\n    if user == nil {\n        return nil, ErrUserNotFound\n\
    \    }\n    return user, nil\n}\n```"
  checkpoint: ''
  anti_patterns:
  - Don't communicate by sharing memory; share memory by communicating
  - Don't use init() functions
  - Don't panic in library code
  - Avoid global mutable state
  - Don't use named returns except for documentation
  - "Don't over-interface\u2014only abstract at boundaries"
  prompts: []
