name: borg-autosuggest
version: "1.0.0"
description: >
  Bridge between Hermes agent loop and Borg auto-suggest.
  Uses agent-borg's agent_hook functions to:
    - Call borg_on_failure() after consecutive tool errors (2+)
    - Call borg_on_task_start() to proactively suggest packs
  Requires agent-borg to be installed in the same Python environment.
author: Borg
provides_hooks:
  - on_consecutive_failure
  - on_task_start
requires_env: []
provides_tools:
  - borg_autosuggest
