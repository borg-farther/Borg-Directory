name: django-schema-drift
problem_class: schema_drift
license: MIT
description: |
  Django model and database schema are out of sync.
  "no such column" or "table has no column" errors after adding fields.
solution: |
  Run: python manage.py makemigrations <app_name>
  Then apply: python manage.py migrate
  If the column exists in DB but Django doesn't know, fake the migration:
  python manage.py migrate --fake <app_name>
source_url: https://docs.djangoproject.com/en/stable/topics/migrations/
tier: SEED
tags:
  - django
  - schema
  - migration
required_inputs:
  - name: error_message
    type: string
escalation_rules:
  - condition: "'no such column' in error_message"
    action: run makemigrations and migrate
