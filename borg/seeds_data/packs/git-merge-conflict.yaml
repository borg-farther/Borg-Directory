name: git-merge-conflict
problem_class: merge_conflict
description: |
  Git merge or rebase fails due to conflicting changes.
  "CONFLICT (content): merge conflict in <file>".
solution: |
  1. Open conflicting files and look for <<<<<<< HEAD markers
  2. Manually resolve each conflict by keeping or combining changes
  3. Remove the conflict markers (<<<<<<<, =======, >>>>>>>)
  4. Run: git add <resolved-file>
  5. Complete with: git commit (for merge) or git rebase --continue (for rebase)
source_url: https://git-scm.com/docs/merge-strategies
tier: SEED
tags:
  - git
  - merge
  - conflict
required_inputs:
  - name: error_message
    type: string
escalation_rules:
  - condition: "'CONFLICT' in error_message"
    action: open conflicting files and manually resolve
