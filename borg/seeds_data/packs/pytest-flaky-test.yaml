name: pytest-flaky-test
problem_class: flaky_test
description: |
  Pytest test passes sometimes and fails other times without code changes.
  Tests using network, time-based assertions, or shared state are flaky.
solution: |
  1. Use pytest-reraise or pytest-flakefinder for retries
  2. Add proper teardown in fixtures with yield instead of setup
  3. Mock external dependencies (network, time, random)
  4. Increase timeouts for async operations
  5. Use pytest.mark.flaky with reruns: @pytest.mark.flaky(reruns=3)
  6. Isolate tests so they don't share state
source_url: https://docs.pytest.org/en/stable/explanation/flaky.html
tier: SEED
tags:
  - pytest
  - testing
  - flaky
required_inputs:
  - name: error_message
    type: string
escalation_rules:
  - condition: "'FAILED' in error_message"
    action: identify shared state or timing dependencies
