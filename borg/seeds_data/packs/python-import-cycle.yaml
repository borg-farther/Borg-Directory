name: python-import-cycle
problem_class: import_cycle
license: MIT
description: |
  Python module fails with "ImportError: circular import" or
  "cannot import name 'X' from 'Y'".
solution: |
  Move the problematic import inside the function that needs it.
  Or refactor to a shared third module that both can import.
  Use TYPE_CHECKING for type hints: from typing import TYPE_CHECKING
  Then import inside functions: if TYPE_CHECKING: from X import Y
source_url: https://docs.python.org/3/tutorial/modules.html
tier: SEED
tags:
  - python
  - import
  - cycle
required_inputs:
  - name: error_message
    type: string
escalation_rules:
  - condition: "'circular import' in error_message"
    action: identify the cycle and break it via lazy import
  - condition: "'cannot import name' in error_message"
    action: check for circular dependency
