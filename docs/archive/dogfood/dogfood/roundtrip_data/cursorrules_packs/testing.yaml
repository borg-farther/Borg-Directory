phases:
- name: test_structure
  description: "- Follow Arrange-Act-Assert (AAA) pattern\n- One assertion per test\
    \ when possible\n- Use descriptive test names: test_should_return_404_when_user_not_found\n\
    - Group related tests in describe/context blocks\n- Keep tests independent\u2014\
    no shared mutable state"
  checkpoint: ''
  anti_patterns:
  - Don't test framework code
  - Don't test private methods directly
  - Don't write tests that depend on execution order
  - "Don't use sleep() for async testing\u2014use proper awaits"
  - Don't assert on exact error messages (they change)
  - "Don't mock everything\u2014some integration is good"
  prompts: []
