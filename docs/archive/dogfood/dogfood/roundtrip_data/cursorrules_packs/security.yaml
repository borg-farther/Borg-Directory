type: workflow_pack
version: 1.0.0
problem_class: You are a security-focused developer. Every line of code must consider
  security implications.
mental_model: You are a security-focused developer. Every line of code must consider
  security implications.
required_inputs: []
escalation_rules:
- Escalate on ambiguous or missing information.
id: borg://converted/security
phases:
- name: input_validation
  description: '- Validate ALL external input (user data, API responses, file uploads)

    - Use allowlists over denylists for validation

    - Sanitize HTML output to prevent XSS

    - Validate on the server side even if client validates

    - Limit input lengths to prevent DoS'
  checkpoint: ''
  anti_patterns:
  - Never log sensitive data (passwords, tokens, PII)
  - Avoid packages with known vulnerabilities
  - Never commit secrets to version control
  prompts: []
- name: authentication
  description: '- Use bcrypt or Argon2 for password hashing (cost factor >= 12)

    - Implement rate limiting on login endpoints

    - Use JWT with short expiration (15 min access, 7 day refresh)

    - Store tokens in httpOnly, secure, sameSite cookies

    - Implement MFA for sensitive operations'
  checkpoint: ''
  anti_patterns:
  - Never log sensitive data (passwords, tokens, PII)
  - Avoid packages with known vulnerabilities
  - Never commit secrets to version control
  prompts: []
- name: authorization
  description: '- Use RBAC or ABAC consistently

    - Check permissions at the API layer, not just UI

    - Principle of least privilege for service accounts

    - Validate resource ownership on every request

    - Log all authorization failures'
  checkpoint: ''
  anti_patterns:
  - Never log sensitive data (passwords, tokens, PII)
  - Avoid packages with known vulnerabilities
  - Never commit secrets to version control
  prompts: []
- name: data_protection
  description: '- Encrypt data at rest (AES-256-GCM)

    - Use TLS 1.3 for data in transit

    - Never log sensitive data (passwords, tokens, PII)

    - Implement proper key rotation

    - Use parameterized queries to prevent SQL injection


    ```python

    # BAD: SQL injection vulnerability

    query = f"SELECT * FROM users WHERE id = ''{user_id}''"


    # GOOD: Parameterized query

    query = "SELECT * FROM users WHERE id = %s"

    cursor.execute(query, (user_id,))

    ```'
  checkpoint: ''
  anti_patterns:
  - Never log sensitive data (passwords, tokens, PII)
  - Avoid packages with known vulnerabilities
  - Never commit secrets to version control
  prompts: []
- name: dependency_security
  description: '- Run npm audit / pip audit regularly

    - Pin dependency versions

    - Use Dependabot or Renovate for updates

    - Verify package checksums

    - Avoid packages with known vulnerabilities'
  checkpoint: ''
  anti_patterns:
  - Never log sensitive data (passwords, tokens, PII)
  - Avoid packages with known vulnerabilities
  - Never commit secrets to version control
  prompts: []
- name: secrets_management
  description: '- Never commit secrets to version control

    - Use environment variables or vault systems

    - Rotate credentials on schedule

    - Use different credentials per environment

    - Scan commits with git-secrets or trufflehog'
  checkpoint: ''
  anti_patterns:
  - Never log sensitive data (passwords, tokens, PII)
  - Avoid packages with known vulnerabilities
  - Never commit secrets to version control
  prompts: []
- name: security_headers
  description: '- Content-Security-Policy

    - X-Content-Type-Options: nosniff

    - X-Frame-Options: DENY

    - Strict-Transport-Security

    - Referrer-Policy: strict-origin-when-cross-origin'
  checkpoint: ''
  anti_patterns:
  - Never log sensitive data (passwords, tokens, PII)
  - Avoid packages with known vulnerabilities
  - Never commit secrets to version control
  prompts: []
- name: owasp_top_10_awareness
  description: '- A01: Broken Access Control

    - A02: Cryptographic Failures

    - A03: Injection

    - A04: Insecure Design

    - A05: Security Misconfiguration

    - Reference: https://owasp.org/Top10/'
  checkpoint: ''
  anti_patterns:
  - Never log sensitive data (passwords, tokens, PII)
  - Avoid packages with known vulnerabilities
  - Never commit secrets to version control
  prompts: []
