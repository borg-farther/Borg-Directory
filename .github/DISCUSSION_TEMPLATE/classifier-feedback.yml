title: "first-10 beta feedback — ACTION / STOP / VERIFY"
labels: ["first-10-feedback"]
body: |
  ## Please do not paste secrets

  Do not paste API keys, passwords, tokens, cookies, customer data, private repo contents, or unsanitized private stack traces.

  ## What we want to learn

  Borg is ready for controlled first-10 beta sharing, not public self-serve launch. The success metric is simple: at least 6 of the first 10 users should get one relevant ACTION / STOP / VERIFY moment without maintainer handholding.

  Please answer any of these:

  1. How did you use Borg? CLI, MCP agent, Hermes/chat-hosted agent, or Python API?
  2. What sanitized task/error did you try?
  3. Did Borg return ACTION / STOP / VERIFY?
  4. Was it relevant?
  5. Did it prevent a dead end?
  6. Did you need maintainer help?
  7. What should be clearer or simpler?
