name: First-10 beta feedback
description: Report whether Borg gave you a useful ACTION / STOP / VERIFY moment
title: "[first-10 feedback] "
labels: ["first-10-feedback"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for trying Borg. Please do not paste API keys, passwords, tokens, cookies, customer data, private repo contents, or unsanitized private stack traces.

  - type: dropdown
    id: path
    attributes:
      label: How did you use Borg?
      options:
        - CLI (`borg rescue`, `borg search`, etc.)
        - MCP agent (Claude Code, Cursor, Cline, Continue, Goose, etc.)
        - Hermes / chat-hosted agent
        - Python API
        - Other
    validations:
      required: true

  - type: textarea
    id: task
    attributes:
      label: What task or error did you try?
      description: Use a sanitized summary if the original error contains private data.
      placeholder: "e.g. ModuleNotFoundError in a fresh venv; Django migration table already exists; pytest import failure"
    validations:
      required: true

  - type: dropdown
    id: outcome
    attributes:
      label: Did Borg return a relevant ACTION / STOP / VERIFY moment?
      options:
        - Yes, relevant and useful
        - Partly useful
        - No, unrelated guidance
        - No confident match, and that was correct
        - No confident match, but I expected help
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: What did Borg help you do or avoid?
      placeholder: "What ACTION did you try? What STOP/dead-end did it prevent? How did you verify?"
    validations:
      required: false

  - type: dropdown
    id: handholding
    attributes:
      label: Did you need maintainer help to get value?
      options:
        - No
        - Yes, install/setup help
        - Yes, understanding output
        - Yes, tool did not work
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      placeholder: "Bugs, confusing docs, missing integrations, or feature requests."
    validations:
      required: false
