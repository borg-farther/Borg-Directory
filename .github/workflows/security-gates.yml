name: Borg Security Gates

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pip-audit
      - run: pip-audit || true

  static-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip bandit
      - run: bandit -r borg -x '*/tests/*' -lll -iii -s B322

  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,crypto]"
      - run: python scripts/security_gate_check.py
      - run: python scripts/run_atom_fixture_corpus.py
      - run: python -m pytest -q tests/security/test_privacy_structured.py tests/security/test_prompt_injection.py tests/security/test_learning_atoms.py tests/security/test_atom_policy.py tests/security/test_atom_retrieval_firewall.py tests/security/test_atom_store.py tests/security/test_learning_atom_publish.py tests/cli/test_cli_atom.py
