name: Self-service readiness watchdog

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  ops-readiness-watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Borg with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all]"
          python -m pip install pytest

      - name: Refresh mutable readiness evidence
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            source_repo="https://github.com/${{ github.event.pull_request.head.repo.full_name }}.git"
            source_ref="${{ github.event.pull_request.head.sha }}"
          else
            source_repo="https://github.com/${{ github.repository }}.git"
            source_ref="${GITHUB_SHA}"
          fi
          python eval/run_github_source_install_canary.py --repo-url "$source_repo" --ref "$source_ref" --expected-commit "$source_ref"
          set +e
          python eval/run_pypi_fresh_install_canary.py
          rc_pypi=$?
          set -e
          if [ "$rc_pypi" -ne 0 ]; then
            echo "PyPI canary failed; continuing so public/readiness gates can fail closed with the fresh snapshot."
          fi
          python eval/cold_start_trust_gate.py
          set +e
          python eval/release_governance_gate.py --output eval/release_governance_snapshot.json
          rc_governance=$?
          set -e
          if [ "$rc_governance" -ne 0 ]; then
            echo "Release governance gate failed; continuing so public/readiness gates can fail closed with the fresh snapshot."
          fi

      - name: Regenerate fail-closed readiness snapshots
        run: |
          set -euo pipefail
          python eval/rollback_comms_drill.py
          python eval/self_service_ops_gate.py
          set +e
          python eval/public_self_serve_launch_gate.py > /tmp/public_gate.json
          rc_public=$?
          python eval/real_user_rollout_gate.py > /tmp/real_user_gate.json
          rc_real=$?
          set -e
          cat /tmp/public_gate.json
          cat /tmp/real_user_gate.json
          if [ "$rc_public" -ne 1 ]; then
            echo "expected public self-serve gate to fail closed with rc=1 until first-10 evidence passes; got rc=$rc_public"
            exit 1
          fi
          if [ "$rc_real" -ne 1 ]; then
            echo "expected real-user rollout gate to fail closed with rc=1 until first-10/100-user evidence passes; got rc=$rc_real"
            exit 1
          fi
          python - <<'PY'
          import json
          from eval.ops_readiness_watchdog import public_gate_fail_closed_state_is_expected

          data = json.load(open('/tmp/public_gate.json'))
          assert public_gate_fail_closed_state_is_expected(data), data.get('blockers')
          PY

      - name: Rebuild public dashboard before watchdog source-honesty check
        run: |
          python scripts/build_borg_proof_dashboard.py

      - name: Regenerate watchdog snapshot for dashboard evidence
        run: |
          python eval/ops_readiness_watchdog.py --mode pr --json --max-snapshot-age-hours 24 --allow-public-blocker release_controls_or_first_10_evidence --require-ci-schedule

      - name: Refresh public and real-user snapshots after watchdog regeneration
        run: |
          set -euo pipefail
          set +e
          python eval/public_self_serve_launch_gate.py > /tmp/public_gate_after_watchdog.json
          rc_public=$?
          python eval/real_user_rollout_gate.py > /tmp/real_user_gate_after_watchdog.json
          rc_real=$?
          set -e
          cat /tmp/public_gate_after_watchdog.json
          cat /tmp/real_user_gate_after_watchdog.json
          if [ "$rc_public" -ne 1 ]; then
            echo "expected public self-serve gate to fail closed after watchdog regeneration; got rc=$rc_public"
            exit 1
          fi
          if [ "$rc_real" -ne 1 ]; then
            echo "expected real-user rollout gate to fail closed after watchdog regeneration; got rc=$rc_real"
            exit 1
          fi

      - name: Regenerate final watchdog snapshot for dashboard evidence
        run: |
          python eval/ops_readiness_watchdog.py --mode pr --json --max-snapshot-age-hours 24 --allow-public-blocker release_controls_or_first_10_evidence --require-ci-schedule

      - name: Rebuild derived proof dashboard
        run: |
          python scripts/build_borg_proof_dashboard.py

      - name: Verify watchdog after dashboard rebuild
        run: |
          python eval/ops_readiness_watchdog.py --mode pr --json --no-write --output eval/ops_readiness_watchdog_post_dashboard_check.json --max-snapshot-age-hours 24 --allow-public-blocker release_controls_or_first_10_evidence --require-ci-schedule

      - name: Lint proof dashboard
        run: |
          python scripts/borg_proof_dashboard_lint.py

      - name: Run watchdog regression tests
        run: |
          python -m pytest -q tests/readiness/test_self_service_ops_gate.py tests/readiness/test_ops_readiness_watchdog.py tests/readiness/test_public_self_serve_launch_gate.py eval/tests/test_borg_proof_dashboard.py --tb=short
