name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest --tb=short -q

      - name: Run public-readiness fail-closed tests
        run: |
          python -m pytest eval/tests/test_real_user_rollout_gate.py tests/readiness/test_public_self_serve_launch_gate.py --tb=short -q

  wheel-smoke:
    # The `test` job installs `pip install -e .` (editable/source), which cannot
    # catch a wheel that ships without its data files. This job builds the actual
    # wheel, installs it in a FRESH venv (no source tree), and runs the day-1 path
    # so packaging breaks (missing seeds_data, broken entry points) fail HERE,
    # pre-publish, instead of after the wheel is on PyPI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel, install in a fresh venv, smoke the day-1 path
        run: bash scripts/wheel_smoke.sh
