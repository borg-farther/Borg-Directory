# Smithery.ai MCP Server Submission - Draft for agent-borg
# ===========================================================
# 
# WHAT IS SMITHERY.AI:
# - The largest open marketplace of MCP (Model Context Protocol) servers
# - Website: https://smithery.ai
# - CLI tool: npm install -g @smithery/cli
# 
# HOW TO SUBMIT/LIST:
# - Submit by entering your server's public HTTPS URL at smithery.ai
# - Smithery scans the URL for server-card.json and MCP capabilities
# - Alternative: Use the web dashboard at https://smithery.ai/dashboard
#
# SUBMISSION URLS:
# - Publish page: https://smithery.ai/dashboard/servers/new
# - API endpoint: https://smithery.ai/api/v1/servers (REST API available)
# - Smithery CLI: smithery mcp add <url> --id <name>
#
# REQUIRED METADATA FOR SUBMISSION:
# ===========================================================

# Server identification
name: "agent-borg"
displayName: "Agent Borg"
namespace: "borg"
slug: ""

# Description (required - shown in marketplace)
description: |
  Agent Borg is a local-first MCP server for failure memory: agents can ask for
  ACTION / STOP / VERIFY guidance on concrete errors and avoid known dead-end
  approaches when trusted evidence exists.

# Detailed description for the server card
longDescription: |
  Agent Borg is an MCP server for AI agents that returns ACTION / STOP / VERIFY
  guidance for concrete failures, preserves explicit NO_CONFIDENT_MATCH behavior
  when evidence is weak, and records outcome feedback only through the configured
  local/private store.
  
  Features:
  - 24 built-in MCP tools for failure memory, rescue, feedback, runtime fingerprinting, and readiness-safe diagnostics
  - Search local/trusted failure-memory records and workflow packs
  - Retrieve source-scoped solution patterns and approaches
  - Avoid known dead-end approaches without claiming measured savings until first-10 evidence exists

# Icon/logo URL (optional - will use default if not provided)
iconUrl: ""

# Category/tags for discovery
tags:
  - "agent"
  - "knowledge-base"
  - "efficiency"
  - "problem-solving"
  - "ai-tools"

category: "developer-tools"

# Homepage/GitHub URL
homepage: "https://github.com/borg-farther/Borg-Directory"
url: "https://github.com/borg-farther/Borg-Directory"

# Author information
authorName: "Borg contributors"
authorAvatarUrl: ""

# Server connection details
# ===========================================================
# The MCP server command to run. Use the installed console script so users run the
# same package-managed runtime proven by the PyPI/stdout MCP freshness gate.
serverCommand: "borg-mcp"
serverArgs: []

# Environment variables (if needed - leave empty for borg)
serverEnv: {}
# Example:
#   BORG_API_KEY: "your-api-key-here"

# MCP server configuration for clients (JSON format)
# This is what users will copy into their MCP client config
serverConfig: |
  {
    "mcpServers": {
      "borg": {
        "command": "borg-mcp",
        "args": []
      }
    }
  }

# Server parameters (for templated configs)
serverParams: |
  {}

# Transport type - Smithery supports:
# - stdio (default for local servers)
# - streamable-http (for remote servers with HTTPS)
transportType: "stdio"

# Whether server requires authentication
requiresAuth: false

# Server Info (from mcp_server.py)
serverInfo: |
  {
    "name": "borg-mcp-server",
    "version": "3.3.15"
  }

# Tools exposed by this MCP server (24 total; authoritative list is discovered from borg-mcp tools/list):
# - borg_rescue / error_lookup: ACTION / STOP / VERIFY rescue for concrete failures
# - borg_observe / borg_recall / borg_record_failure: task-start guidance and durable learning memory
# - borg_feedback / borg_apply / borg_search / borg_pull / borg_try / borg_generate / borg_convert: workflow-pack operations
# - borg_runtime_fingerprint: version/path/hash/canary proof for stale-runtime detection
# - reputation, analytics, dashboard, dojo, context, publish, init, first-10/readiness helpers

# OAuth configuration (if requiresAuth is true)
# oauthConfig: |
#   {
#     "clientId": "...",
#     "scopes": ["..."]
#   }

# Deployment status
isDeployed: false  # Set to true only after hosted infrastructure is live and fingerprinted.
remote: false      # Local stdio draft. Remote/HTTP listing remains NO-GO until served runtime cutover proof passes.

# Server capabilities (auto-detected from MCP handshake, but can specify)
# These will be auto-detected from the MCP protocol handshake

# Server card JSON (auto-discovered at /.well-known/mcp/server-card.json)
# The server should expose this endpoint with serverInfo, tools, resources, etc.

# Smithery-specific metadata
# ===========================================================
verified: false  # Set to true after verification
isOfficial: false  # Set to true if official/verified server
useCount: 0     # Usage count (populated by Smithery after listing)
score: null      # Smithery score/ranking

# Additional metadata
metadata: |
  {
    "language": "Python",
    "license": "MIT",
    "mcpTools": 24,
    "description": "Local-first failure memory MCP server for ACTION / STOP / VERIFY guidance"
  }

# ===========================================================
# OTHER MCP REGISTRIES TO CONSIDER:
# ===========================================================
#
# 1. MCP.SO (https://mcp.so)
#    - Large collection of MCP servers
#    - Submission via GitHub repo or direct API
#    - Similar metadata requirements
#
# 2. GLAMA.AI (https://glama.ai/mcp-servers)
#    - MCP server registry
#    - Browse at https://glama.ai/mcp-servers
#
# 3. OFFICIAL MCP SERVER REPO
#    - https://github.com/modelcontextprotocol/servers
#    - Submit PR to add your server to official list
#
# ===========================================================
# SUBMISSION NOTES:
# ===========================================================
#
# For Smithery specifically:
# 1. Your server MUST expose a valid MCP handshake via the transport
# 2. For stdio transport: command must be executable
# 3. For HTTP transport: must be streamable HTTP with proper MCP framing
# 4. Server card JSON at /.well-known/mcp/server-card.json is auto-discovered
#
# To test locally with Smithery CLI:
#   smithery mcp add "borg-mcp" --id borg
#
# To publish:
#   1. Login at https://smithery.ai/dashboard
#   2. Go to Publish -> MCP Servers
#   3. Enter your server URL (must be HTTPS for remote servers)
#   4. Complete the publishing flow
