name: file-encoding-error
problem_class: file_encoding_error
description: |
  UnicodeDecodeError, encoding mismatch, BOM character at file start,
  or wrong encoding specified when reading/writing text files.
solution: |
  1. Identify the file encoding: chardet <file> or file --mime-encoding <file>
  2. Specify correct encoding when opening: open(path, encoding='utf-8')
  3. Remove BOM: open(path, encoding='utf-8-sig') automatically strips UTF-8 BOM
  4. Convert file encoding: iconv -f ISO-8859-1 -t UTF-8 input.txt > output.txt
  5. Set default encoding in Python: PYTHONIOENCODING=utf-8
  6. Check for encoding declarations in file (XML, HTML meta tags)
  7. Use errors='ignore' or errors='replace' only as last resort
source_url: https://docs.python.org/3/library/codecs.html#standard-encodings
tier: SEED
tags: [encoding, unicode, utf-8, bom, file, python]
---
name: port-already-in-use
problem_class: port_already_in_use
description: |
  EADDRINUSE error, port already bound by another process, cannot bind to port,
  address already in use when starting server.
solution: |
  1. Find process using port: lsof -i :<port> or ss -tlnp | grep <port>
  2. Kill the process: kill -9 <PID>
  3. Use SO_REUSEADDR: setsockopt(server_fd, SOL_SOCKET, SO_REUSEADDR, 1, 1)
  4. Change to a different port if available
  5. Check for multiple instances of the same server running
  6. Verify no zombie processes holding the port
  7. For Docker: expose different host port or use --network=host
source_url: https://docs.python.org/3/library/socket.html#socket.socket.setsockopt
tier: SEED
tags: [network, port, socket, eaddrinuse, server, docker]
---
name: test-flaky-timing
problem_class: test_flaky_timing
description: |
  Intermittent test failures, setTimeout race conditions, async test setup/teardown
  issues, tests pass sometimes and fail others due to timing.
solution: |
  1. Increase test timeouts: jest --testTimeout=30000 or pytest timeout plugin
  2. Use async test frameworks properly: await promises, async/await in test functions
  3. Add explicit waits: await page.waitForSelector() or time.sleep() after actions
  4. Mock timers: jest.useFakeTimers(), pytest-async timeout
  5. Use retry mechanisms for flaky assertions with retry libraries
  6. Isolate tests: ensure each test has its own setup/teardown
  7. Check for shared state between tests causing interference
  8. Run tests sequentially if parallel execution causes race conditions
source_url: https://jestjs.io/docs/asynchronous
tier: SEED
tags: [testing, flaky, timing, async, jest, pytest, race-condition]
---
name: database-connection-refused
problem_class: database_connection_refused
description: |
  Connection refused on database startup, wrong host/port combination,
  database server not running, authentication failed.
solution: |
  1. Verify database server is running: systemctl status postgresql/mysql
  2. Check connection string/URI for typos
  3. Verify host/port is reachable: telnet <host> <port>
  4. Check firewall rules allow connection to DB port
  5. Verify credentials: password, username, database name
  6. Confirm database exists: list DBs with psql -l / mysql -e SHOW DATABASES
  7. Check connection pool exhaustion if using a pooler
  8. Try localhost instead of 127.0.0.1 or vice versa
source_url: https://docs.python.org/3/library/sqlite3.html
tier: SEED
tags: [database, connection, refused, postgres, mysql, sqlite]
---
name: python-virtual-env
problem_class: python_virtual_env
description: |
  Wrong Python version active, venv not activated, pip installs globally,
  ModuleNotFoundError despite package installed, pyenv version mismatch.
solution: |
  1. Check Python in use: which python, python --version
  2. Activate venv: source venv/bin/activate (Linux) or venv\Scripts\activate (Windows)
  3. Verify venv is active: prompt should show (venv)
  4. Use pyenv to manage Python versions: pyenv versions
  5. Set local Python: pyenv local 3.11.5
  6. Install packages with python -m pip install <package>
  7. Check site-packages: python -c "import site; print(site.getsitepackages())"
  8. Recreate venv: python -m venv venv --clear
source_url: https://docs.python.org/3/library/venv.html
tier: SEED
tags: [python, virtualenv, venv, pyenv, environment]
---
name: environment-variable-missing
problem_class: environment_variable_missing
description: |
  Environment variable not set: KeyError, None returned, or application
  crashes on startup due to missing ENV var.
solution: |
  1. Check if var is set: echo $VAR_NAME (Linux) or echo %VAR_NAME% (Windows)
  2. List all env vars: env | grep <pattern>
  3. Add to .env file or export in shell profile
  4. For Docker: add -e VAR_NAME=value or .env file
  5. Provide sensible defaults where possible
  6. Document required environment variables clearly
  7. Use os.environ.get() with defaults to prevent crashes
source_url: https://docs.python.org/3/library/os.html#os.environ
tier: SEED
tags: [environment, env, variables, configuration, dotenv]
